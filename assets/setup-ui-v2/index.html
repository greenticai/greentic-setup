<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data:;
  font-src 'self';
  connect-src 'self';
  frame-ancestors 'none';
  base-uri 'none';
  form-action 'none';
">
<title>Greentic Setup</title>
<link rel="preload" href="/vendor/poppins/poppins-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/vendor/poppins/poppins-500.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/vendor/poppins/poppins-600.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/layout.css">
<link rel="stylesheet" href="/styles/components.css">
<link rel="stylesheet" href="/styles/animations.css">
</head>
<body x-data x-init="$store.ui.init()">

<!-- Initial state injected by the server — includes bearer_token, port,
     bundle_id, initial locale catalog. Scripts read from here on boot. -->
<script id="initial-state" type="application/json">{{INITIAL_STATE}}</script>

<!-- App shell — full component templates land in Tasks 26-29. -->
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/icons/greentic-mascot.png" alt="">
      <div>
        <div class="sidebar-brand-text" x-text="t('ui.brand.name')">Greentic Setup</div>
        <div class="sidebar-brand-sub" x-text="$store.bundle.displayName"></div>
      </div>
    </div>

    <!-- Scope switcher + nav will be populated by components in Tasks 26-27 -->
    <div class="sidebar-scope">
      <div class="sidebar-scope-label" x-text="t('ui.sidebar.scope_label')">Scope</div>
      <!-- Tasks 26-27 replace this with real template -->
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-nav-label" x-text="t('ui.sidebar.nav.manage_label')">Manage</div>
      <!-- Tasks 26-27 add nav items -->
    </nav>

    <div class="sidebar-footer">
      <div class="dot"></div>
      <span x-text="t('ui.footer.server_running', { port: $store.ui.port })"></span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-breadcrumb" x-text="$store.ui.breadcrumb"></div>
    </div>
    <div class="content">
      <p class="fade-in" x-text="t('ui.overview.welcome_title')">Welcome back</p>
      <p class="fade-in" style="color: var(--fg-muted); margin-top: 8px;">Phase 1a dashboard shell — components arrive in Tasks 26-29.</p>
    </div>
  </main>
</div>

<!-- JS layer loaded in dependency order. -->
<script src="/js/formatters.js"></script>
<script src="/js/api.js"></script>
<script src="/js/router.js"></script>
<script src="/js/stores/locale.js"></script>
<script src="/js/stores/bundle.js"></script>
<script src="/js/stores/scope.js"></script>
<script src="/js/stores/overview.js"></script>
<script src="/js/stores/wizard.js"></script>
<script src="/js/stores/ui.js"></script>
<script src="/js/app.js"></script>
<script src="/vendor/alpine/alpine.min.js" defer></script>
</body>
</html>
