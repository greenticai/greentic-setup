<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="same-origin">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data:;
  font-src 'self';
  connect-src 'self';
  base-uri 'none';
  form-action 'none';
">
<title>Greentic Setup</title>
<link rel="preload" href="/vendor/poppins/poppins-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/vendor/poppins/poppins-500.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/vendor/poppins/poppins-600.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/layout.css">
<link rel="stylesheet" href="/styles/components.css">
<link rel="stylesheet" href="/styles/animations.css">
</head>
<body x-data x-init="$store.ui.init()">

<script id="initial-state" type="application/json">{{INITIAL_STATE}}</script>

<div class="shell">

  <!-- ==================== SIDEBAR ==================== -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <img src="/icons/greentic-mascot.png" alt="">
      <div>
        <div class="sidebar-brand-text" x-text="t('ui.brand.name')">Greentic Setup</div>
        <div class="sidebar-brand-sub" x-text="$store.bundle.displayName"></div>
      </div>
    </div>

    <!-- Scope switcher: 3 native selects (tenant / env / team).
         Native <select> is used for keyboard accessibility and
         zero-custom-dropdown-logic. Styled via .scope-select to match
         the sidebar aesthetic. -->
    <div class="sidebar-scope">
      <div class="sidebar-scope-label">
        <span x-text="t('ui.sidebar.scope_label')">Scope</span>
        <span class="info-icon" :title="t('ui.sidebar.scope_tooltip')" aria-label="Scope information">&#9432;</span>
      </div>
      <div class="sidebar-scope-subtitle" x-text="t('ui.sidebar.scope_subtitle')">Active context for all operations</div>

      <label class="scope-dropdown active">
        <span class="hint" x-text="t('ui.scope.tenant_label')">tenant</span>
        <select class="scope-select" :value="$store.scope.tenant" @change="$store.scope.set($event.target.value, $store.scope.env, $store.scope.team)">
          <template x-for="t in $store.bundle.availableTenants" :key="t">
            <option :value="t" :selected="t === $store.scope.tenant" x-text="t"></option>
          </template>
        </select>
        <span class="caret" aria-hidden="true">&#9662;</span>
      </label>

      <label class="scope-dropdown">
        <span class="hint" x-text="t('ui.scope.env_label')">env</span>
        <select class="scope-select" :value="$store.scope.env" @change="$store.scope.set($store.scope.tenant, $event.target.value, $store.scope.team)">
          <template x-for="e in $store.bundle.availableEnvs" :key="e">
            <option :value="e" :selected="e === $store.scope.env" x-text="e"></option>
          </template>
        </select>
        <span class="caret" aria-hidden="true">&#9662;</span>
      </label>

      <label class="scope-dropdown">
        <span class="hint" x-text="t('ui.scope.team_label')">team</span>
        <select class="scope-select" :value="$store.scope.team" @change="$store.scope.set($store.scope.tenant, $store.scope.env, $event.target.value)">
          <template x-for="tm in $store.bundle.availableTeams" :key="tm">
            <option :value="tm" :selected="tm === $store.scope.team" x-text="tm"></option>
          </template>
        </select>
        <span class="caret" aria-hidden="true">&#9662;</span>
      </label>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label" x-text="t('ui.sidebar.nav.manage_label')">Manage</div>

      <div class="nav-item active" @click="$store.ui.currentView = 'overview'">
        <span class="ico"></span>
        <span x-text="t('ui.sidebar.nav.overview')">Overview</span>
      </div>

      <div class="nav-item disabled" :title="t('ui.nav.coming_in_phase_1b')">
        <span class="ico"></span>
        <span x-text="t('ui.sidebar.nav.providers')">Providers</span>
        <span class="phase-tag">1b</span>
      </div>

      <div class="nav-item disabled" :title="t('ui.nav.coming_in_phase_1b')">
        <span class="ico"></span>
        <span x-text="t('ui.sidebar.nav.secrets')">Secrets</span>
        <span class="phase-tag">1b</span>
      </div>

      <div class="nav-item disabled" :title="t('ui.nav.coming_in_phase_1b')">
        <span class="ico"></span>
        <span x-text="t('ui.sidebar.nav.capabilities')">Capabilities</span>
        <span class="phase-tag">1b</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="dot"></div>
      <span x-text="t('ui.footer.server_running', { port: $store.ui.port })"></span>
    </div>
  </aside>

  <!-- ==================== MAIN ==================== -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-breadcrumb" x-text="$store.ui.breadcrumb"></div>
      <label style="display:inline-flex;align-items:center;gap:6px">
        <span class="field-label" style="margin:0;color:var(--fg-muted);font-size:11px" x-text="t('ui.topbar.locale_label')">Language</span>
        <select class="field-input" style="max-width:120px;padding:6px 10px;font-size:12px" :value="$store.locale.code" @change="$store.locale.switch($event.target.value)">
          <template x-for="code in $store.ui.availableLocales" :key="code">
            <option :value="code" :selected="code === $store.locale.code" x-text="code.toUpperCase()"></option>
          </template>
        </select>
      </label>
      <button class="btn btn--ghost" @click="$store.ui.toggleAdvanced()" :class="$store.ui.advancedMode ? 'btn--primary' : ''" x-text="t('ui.topbar.advanced_mode')">Advanced</button>
      <button class="btn" disabled x-text="t('ui.topbar.no_pending_changes')">No pending changes</button>
    </div>

    <!-- ==================== OVERVIEW VIEW ==================== -->
    <div class="content" x-show="$store.ui.currentView === 'overview'" x-cloak>

      <div class="overview-head" style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px">
        <div>
          <h2 style="font-size:24px;font-weight:600" x-text="t('ui.overview.welcome_title')">Welcome back</h2>
          <p style="color:var(--fg-muted);margin-top:4px" x-text="t('ui.overview.welcome_summary', { count: $store.overview.stats.scopes_count, warnings: $store.overview.stats.warnings_count })">&#8212;</p>
        </div>
        <button class="btn btn--primary" @click="$store.ui.currentView = 'wizard'; $store.wizard.start($store.scope.tenant, $store.scope.env, $store.scope.team, null)">
          <span>+</span>
          <span x-text="t('ui.overview.add_scope_btn')">Add tenant</span>
        </button>
      </div>

      <!-- Stats row -->
      <div class="stats">
        <div class="stat">
          <div class="stat-val" x-text="$store.overview.stats.scopes_count">0</div>
          <div class="stat-label" x-text="t('ui.overview.stats.scopes')">Scopes</div>
        </div>
        <div class="stat">
          <div class="stat-val" x-text="$store.overview.stats.providers_count">0</div>
          <div class="stat-label" x-text="t('ui.overview.stats.providers')">Providers</div>
        </div>
        <div class="stat">
          <div class="stat-val" x-text="$store.overview.stats.secrets_count">0</div>
          <div class="stat-label" x-text="t('ui.overview.stats.secrets')">Secrets</div>
        </div>
        <div class="stat">
          <div class="stat-val" :style="$store.overview.stats.warnings_count > 0 ? 'color: var(--warning)' : ''" x-text="$store.overview.stats.warnings_count">0</div>
          <div class="stat-label" x-text="t('ui.overview.stats.warnings')">Warnings</div>
        </div>
      </div>

      <!-- Configured scopes list -->
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px">
        <span style="font-size:14px;font-weight:600" x-text="t('ui.overview.list.title')">Configured scopes</span>
        <span style="font-size:11.5px;color:var(--fg-muted)" x-text="t('ui.overview.list.count', { current: $store.overview.scopes.length, total: $store.overview.scopes.length })"></span>
      </div>

      <template x-for="(s, i) in $store.overview.scopes" :key="i">
        <div class="scope-card" :class="i === 0 ? 'active' : ''">
          <div class="scope-card-head">
            <span class="scope-card-title" x-text="s.scope.tenant + ' / ' + s.scope.env"></span>
            <span x-show="i === 0" style="color:var(--brand);font-size:10px" x-text="'&#8212; ' + t('ui.overview.scope_card.active_label')"></span>
            <span class="scope-card-path" x-text="'team=' + s.scope.team"></span>
          </div>
          <div>
            <template x-for="(p, pi) in s.providers" :key="pi">
              <span class="provider-chip" :class="p.configured ? 'ok' : 'warn'" x-text="p.display_name"></span>
            </template>
            <span class="provider-chip add" x-text="t('ui.overview.scope_card.add_provider')">+ Add provider</span>
          </div>
        </div>
      </template>

      <!-- Loading / empty / error states -->
      <template x-if="$store.overview.scopes.length === 0 && !$store.overview.loading">
        <div class="empty-row" x-text="t('ui.overview.empty_state.no_scopes')">No scopes configured yet</div>
      </template>

      <div class="empty-row" x-show="$store.overview.loading" x-text="t('ui.overview.loading')">Loading...</div>

      <div class="empty-row" x-show="$store.overview.error" x-text="$store.overview.error ? t($store.overview.error.key || 'ui.error.unknown') : ''"></div>
    </div>

    <!-- ==================== WIZARD VIEW ==================== -->
    <div class="content" x-show="$store.ui.currentView === 'wizard'" x-cloak>

      <!-- First-run onboarding banner. Visible when the wizard is reached
           without a prior scope being set up, unless the user dismissed it
           during this session. The dismiss state is kept in-memory only so
           it resurfaces on the next dashboard invocation. -->
      <div
        class="onboarding-banner"
        x-show="!$store.ui.onboardingDismissed && $store.ui.currentView === 'wizard'"
        x-cloak
      >
        <div class="onboarding-banner-icon" aria-hidden="true">&#9433;</div>
        <div class="onboarding-banner-body">
          <div class="onboarding-banner-title" x-text="t('ui.onboarding.scope_banner_title')">Welcome</div>
          <p
            class="onboarding-banner-text"
            x-text="t('ui.onboarding.scope_banner_body', {
              tenant: $store.scope.tenant,
              env: $store.scope.env,
              team: $store.scope.team
            })"
          ></p>
        </div>
        <button
          class="btn btn--ghost onboarding-banner-dismiss"
          @click="$store.ui.dismissOnboarding()"
          x-text="t('ui.onboarding.scope_banner_dismiss')"
        >Got it</button>
      </div>

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <button class="btn btn--ghost" @click="$store.ui.currentView = 'overview'">
          <span x-text="t('ui.wizard.back_to_overview')">&#8592; Back to Overview</span>
        </button>
        <span style="color:var(--fg-muted);font-size:11px" x-text="t('ui.wizard.step_label', { current: $store.wizard.currentStep, total: $store.wizard.totalSteps })"></span>
      </div>

      <!-- Wizard step -->
      <div x-show="$store.wizard.step" x-cloak>
        <h2 style="font-size:22px;font-weight:600;margin-bottom:8px" x-text="$store.wizard.step ? t($store.wizard.step.title_key) : ''"></h2>
        <p style="color:var(--fg-muted);margin-bottom:20px" x-text="$store.wizard.step && $store.wizard.step.description_key ? t($store.wizard.step.description_key) : ''"></p>

        <!-- Field renderer -->
        <template x-for="(field, fi) in ($store.wizard.step ? $store.wizard.step.fields : [])" :key="fi">
          <div class="field">
            <label class="field-label" :data-required="field.required ? '' : null" x-text="field.label_text || t(field.label_key)"></label>

            <!-- Text / Password -->
            <template x-if="field.field_type === 'text' || field.field_type === 'password'">
              <input class="field-input" :type="field.field_type" x-model="$store.wizard.answers[field.name]" :placeholder="field.placeholder_key ? t(field.placeholder_key) : ''" :autocomplete="field.field_type === 'password' ? 'off' : 'on'" :spellcheck="field.field_type === 'password' ? 'false' : 'true'">
            </template>

            <!-- Textarea -->
            <template x-if="field.field_type === 'textarea'">
              <textarea class="field-input" rows="3" x-model="$store.wizard.answers[field.name]" :placeholder="field.placeholder_key ? t(field.placeholder_key) : ''"></textarea>
            </template>

            <!-- Select -->
            <template x-if="field.field_type === 'select'">
              <select class="field-input" x-model="$store.wizard.answers[field.name]">
                <template x-for="opt in field.options" :key="opt.value">
                  <option :value="opt.value" x-text="t(opt.label_key)"></option>
                </template>
              </select>
            </template>

            <!-- Switch (boolean) -->
            <template x-if="field.field_type === 'switch'">
              <label style="display:inline-flex;align-items:center;gap:8px">
                <input type="checkbox" x-model="$store.wizard.answers[field.name]">
                <span x-text="t('ui.field.switch.enabled')">Enabled</span>
              </label>
            </template>

            <div class="field-help" x-show="field.help_key" x-text="field.help_key ? t(field.help_key) : ''"></div>
          </div>
        </template>

        <!-- Wizard actions -->
        <div style="display:flex;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);justify-content:space-between">
          <button class="btn" @click="$store.ui.currentView = 'overview'" x-text="t('ui.wizard.btn.back')">&#8592; Back</button>
          <button
            class="btn btn--primary"
            :disabled="!$store.wizard.canContinue() || $store.wizard.loading"
            :style="(!$store.wizard.canContinue() || $store.wizard.loading) ? 'opacity:0.5;cursor:not-allowed' : ''"
            @click="$store.wizard.currentStep >= $store.wizard.totalSteps ? $store.wizard.execute().then(() => $store.ui.currentView = 'overview') : $store.wizard.next($store.wizard.answers)"
            x-text="$store.wizard.currentStep >= $store.wizard.totalSteps ? t('ui.wizard.btn.finish') : t('ui.wizard.btn.continue')">
          </button>
        </div>
        <!-- Per-field missing indicator -->
        <div x-show="!$store.wizard.canContinue() && !$store.wizard.loading" style="margin-top:10px;font-size:11px;color:var(--warning)" x-text="t('ui.wizard.required_hint')">
          Fill in the required fields to continue.
        </div>
      </div>

      <!-- Done state -->
      <div class="empty-row" x-show="!$store.wizard.step && !$store.wizard.loading" x-text="t('ui.wizard.done')">Wizard complete.</div>

      <!-- Error state -->
      <div class="empty-row" x-show="$store.wizard.error" x-text="$store.wizard.error ? t($store.wizard.error.key || 'ui.error.unknown') : ''"></div>
    </div>

  </main>
</div>

<style>
  [x-cloak] { display: none !important; }
</style>

<!-- JS layer — loaded in dependency order. -->
<script src="/js/formatters.js"></script>
<script src="/js/api.js"></script>
<script src="/js/router.js"></script>
<script src="/js/stores/locale.js"></script>
<script src="/js/stores/bundle.js"></script>
<script src="/js/stores/scope.js"></script>
<script src="/js/stores/overview.js"></script>
<script src="/js/stores/wizard.js"></script>
<script src="/js/stores/ui.js"></script>
<script src="/js/app.js"></script>
<script src="/vendor/alpine/alpine.min.js" defer></script>
</body>
</html>
