name: Auto tag on version change

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autotag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version and create tag
        env:
          GIT_AUTHOR_NAME: ci-bot
          GIT_AUTHOR_EMAIL: ci-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: ci-bot
          GIT_COMMITTER_EMAIL: ci-bot@users.noreply.github.com
        run: |
          set -euo pipefail

          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag="v${version}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::notice::Tag ${tag} already exists. Skipping."
            exit 0
          fi

          echo "Creating tag ${tag}"
          git tag -a "${tag}" -m "greentic-setup ${version}"
          git push --tags
